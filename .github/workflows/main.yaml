set -e

echo "=== STEP 1: Extract project ==="
ls -la
ZIPFILE=$(ls *.zip 2>/dev/null | grep -v sdk.zip | head -1)
[ -n "$ZIPFILE" ] && echo "Extracting $ZIPFILE..." && unzip -o "$ZIPFILE" && rm "$ZIPFILE"
ls -la

echo "=== STEP 2: Java 17 ==="
apt-get update -qq
apt-get install -y -qq openjdk-17-jdk-headless wget
export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
export PATH=$JAVA_HOME/bin:$PATH
java -version

echo "=== STEP 3: Download Gradle 7.5 ==="
wget -q https://services.gradle.org/distributions/gradle-7.5-bin.zip -O /tmp/gradle.zip
unzip -q /tmp/gradle.zip -d /tmp/
export PATH=/tmp/gradle-7.5/bin:$PATH
gradle --version

echo "=== STEP 4: Android SDK ==="
export ANDROID_HOME="/opt/android/sdk"
export PATH=$PATH:$ANDROID_HOME/cmdline-tools/tools/bin

if [ ! -d "$ANDROID_HOME/cmdline-tools" ]; then
  curl -o sdk.zip https://dl.google.com/android/repository/commandlinetools-linux-7583922_latest.zip
  unzip sdk.zip && rm sdk.zip
  mkdir -p "$ANDROID_HOME/cmdline-tools"
  mv cmdline-tools "$ANDROID_HOME/cmdline-tools/tools"
fi

yes | sdkmanager --licenses
yes | sdkmanager "platforms;android-33" "build-tools;33.0.2"

echo "=== STEP 5: Build APK ==="
gradle assembleRelease

echo "=== APK Location ==="
find . -name "*.apk" 2>/dev/null
