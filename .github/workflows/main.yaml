name: Build QuickFill APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Unzip project if it was uploaded as a single zip
        run: |
          if [ -f QuickFill-source.zip ]; then
            unzip -o QuickFill-source.zip
          fi
          ls -la

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Gradle wrapper
        working-directory: QuickFill
        run: gradle wrapper --gradle-version 8.7

      - name: Make gradlew executable
        working-directory: QuickFill
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: QuickFill
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: QuickFill-debug-apk
          path: QuickFill/app/build/outputs/apk/debug/app-debug.apk
